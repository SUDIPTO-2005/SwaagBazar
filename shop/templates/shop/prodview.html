{% extends 'shop/basic.html' %}
{% block title %} {{ product.prod_name }} -- SwaagBazar {% endblock %}

{% block css %}
<style>
    .product-page {
        padding: 20px 0;
    }

    .product-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        padding: 20px;
    }

    .product-image-box {
        background: #f8f9fa;
        border-radius: 14px;
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 340px;
    }

    .product-image-box img {
        width: 100%;
        max-height: 300px;
        object-fit: contain;
        display: block;
        border-radius: 10px;
    }

    .product-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: #212529;
    }

    .product-price {
        font-size: 1.6rem;
        font-weight: 700;
        color: #dc3545;
        margin-bottom: 16px;
    }

    .product-desc {
        font-size: 1rem;
        color: #555;
        line-height: 1.7;
        margin-bottom: 22px;
    }

    .product-btns {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    .product-btns .btn {
        min-width: 140px;
        padding: 10px 18px;
        font-weight: 600;
        border-radius: 10px;
    }

    @media (max-width: 991.98px) {
        .product-title {
            font-size: 1.7rem;
        }

        .product-price {
            font-size: 1.4rem;
        }

        .product-image-box {
            min-height: 300px;
        }

        .product-image-box img {
            max-height: 260px;
        }
    }

    @media (max-width: 767.98px) {
        .product-card {
            padding: 16px;
        }

        .product-image-box {
            min-height: 260px;
            margin-bottom: 18px;
        }

        .product-image-box img {
            max-height: 220px;
        }

        .product-title {
            font-size: 1.45rem;
            margin-top: 8px;
        }

        .product-price {
            font-size: 1.25rem;
        }

        .product-desc {
            font-size: 0.95rem;
        }

        .product-btns {
            flex-direction: column;
        }

        .product-btns .btn {
            width: 100%;
            min-width: unset;
        }
    }

    @media (max-width: 575.98px) {
        .container {
            padding-left: 12px;
            padding-right: 12px;
        }

        .product-page {
            padding: 12px 0;
        }

        .product-image-box {
            min-height: 220px;
            padding: 12px;
        }

        .product-image-box img {
            max-height: 180px;
        }

        .product-title {
            font-size: 1.25rem;
        }

        .product-price {
            font-size: 1.1rem;
        }

        .product-desc {
            font-size: 0.92rem;
            line-height: 1.6;
        }
    }
</style>
{% endblock %}

{% block body %}
<div class="container product-page">
    <div class="product-card">
        <div class="row align-items-center">
            
            <!-- Left Side: Image + Buttons -->
            <div class="col-12 col-md-5 mb-4 mb-md-0">
                <div class="product-image-box">
                    <img src="/media/{{ product.image }}" alt="{{ product.prod_name }}">
                </div>

                <div class="product-btns mt-3">
                    <button class="btn btn-primary">Buy Now</button>
                    <button class="btn btn-success">Add to Cart</button>
                </div>
            </div>

            <!-- Right Side: Product Details -->
            <div class="col-12 col-md-7">
                <h2 class="product-title">{{ product.prod_name }}</h2>
                <div class="product-price">₹ {{ product.price }}</div>
                <p class="product-desc">{{ product.desc }}</p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
