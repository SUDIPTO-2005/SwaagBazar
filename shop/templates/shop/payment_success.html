<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px 25px;
            border-radius: 18px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #28a745;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }

        .checkmark::after {
            content: "✓";
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        h1 {
            color: #28a745;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #555;
            margin: 8px 0;
            font-size: 15px;
        }

        .order-box {
            background: #f9fafb;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
        }

        .order-box p {
            margin: 6px 0;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #218838;
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px 18px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="checkmark"></div>

        <h1>Payment Successful</h1>
        <p>Your transaction was completed successfully.</p>

        {% if order %}
        <div class="order-box">
            <p><b>Order ID:</b> {{ order.ord_id }}</p>
            <p><b>Name:</b> {{ order.name }}</p>
            <p><b>Amount:</b> ₹{{ order.amount }}</p>
        </div>
        {% endif %}

        <a href="/shop/" class="btn">Go to Home</a>
    </div>

</body>
</html>
